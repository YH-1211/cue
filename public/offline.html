<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>オフライン | Cue</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #ffffff;
        --fg: #0a0a0f;
        --muted: #6b7280;
        --border: #e5e7eb;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0a0a0f;
          --fg: #fafafa;
          --muted: #9ca3af;
          --border: #27272a;
        }
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        padding: 24px;
        background: var(--bg);
        color: var(--fg);
        font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans",
          "Yu Gothic", "Meiryo", sans-serif;
      }
      h1 {
        font-size: 24px;
        margin: 0;
        letter-spacing: -0.01em;
      }
      p {
        margin: 0;
        color: var(--muted);
        font-size: 14px;
        text-align: center;
        max-width: 32ch;
      }
      button {
        margin-top: 8px;
        padding: 10px 20px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: var(--fg);
        color: var(--bg);
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <h1>オフラインです</h1>
    <p>インターネット接続が確認できません。<br />接続を確認して、もう一度お試しください。</p>
    <button onclick="location.reload()">再読み込み</button>
  </body>
</html>
